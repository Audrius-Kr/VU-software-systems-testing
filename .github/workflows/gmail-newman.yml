# Scheduled Gmail API regression (Exercise 2) via Newman.
# Cron is UTC: 08:00 daily — document this for coursework proof.
# Secrets: GCP_OAUTH_CLIENT_ID, GCP_OAUTH_CLIENT_SECRET, GMAIL_REFRESH_TOKEN, GMAIL_FROM_EMAIL
name: Gmail API Newman

on:
  push:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  newman:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Mint access token from refresh token
        id: token
        env:
          GCP_OAUTH_CLIENT_ID: ${{ secrets.GCP_OAUTH_CLIENT_ID }}
          GCP_OAUTH_CLIENT_SECRET: ${{ secrets.GCP_OAUTH_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: |
          set -e
          TOKEN="$(node scripts/get-access-token.mjs)"
          echo "::add-mask::$TOKEN"
          echo "ACCESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Run Newman (Exercise_2 only)
        env:
          GMAIL_FROM_EMAIL: ${{ secrets.GMAIL_FROM_EMAIL }}
          GMAIL_TO_EMAIL: ${{ secrets.GMAIL_TO_EMAIL }}
        run: |
          mkdir -p newman
          set -euo pipefail
          : "${GMAIL_FROM_EMAIL:?Missing required secret GMAIL_FROM_EMAIL}"
          TO_EMAIL="${GMAIL_TO_EMAIL:-$GMAIL_FROM_EMAIL}"
          cat > postman/Gmail_API.postman_environment.json <<EOF
          {
            "id": "gmail-api-env-ci",
            "name": "Gmail API (CI)",
            "values": [
              { "key": "access_token", "value": "", "type": "secret", "enabled": true },
              { "key": "from_email", "value": "$GMAIL_FROM_EMAIL", "type": "default", "enabled": true },
              { "key": "to_email", "value": "$TO_EMAIL", "type": "default", "enabled": true },
              { "key": "encoded_raw", "value": "", "type": "default", "enabled": true },
              { "key": "message_id", "value": "", "type": "default", "enabled": true },
              { "key": "label_id", "value": "", "type": "default", "enabled": true }
            ],
            "_postman_variable_scope": "environment",
            "_postman_exported_at": "2026-04-22T00:00:00.000Z",
            "_postman_exported_using": "GitHub Actions"
          }
          EOF
          npx newman run postman/Gmail_API.postman_collection.json \
            -e postman/Gmail_API.postman_environment.json \
            --folder "Exercise_2" \
            --env-var "access_token=$ACCESS_TOKEN" \
            --reporters cli,json \
            --reporter-json-export newman/report.json \
            2>&1 | tee newman/newman.log

      - name: Upload Newman proof (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-gmail-proof
          path: |
            newman/newman.log
            newman/report.json
          if-no-files-found: warn
